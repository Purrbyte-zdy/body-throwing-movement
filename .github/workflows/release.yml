name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi

          if [[ ! "$tag" =~ ^v.+$ ]]; then
            echo "Tag must start with 'v'. Got: $tag" >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -eux
          bin="target/${{ matrix.target }}/release/body-throwing-movement"
          pkg="body-throwing-movement-${{ needs.prepare.outputs.release_tag }}-${{ matrix.target }}"
          mkdir "$pkg"
          cp "$bin" "$pkg/"
          cp README.md LICENSE "$pkg/"
          tar -czf "$pkg.tar.gz" "$pkg"
          sha256sum "$pkg.tar.gz" > "$pkg.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/body-throwing-movement.exe"
          $pkg = "body-throwing-movement-${{ needs.prepare.outputs.release_tag }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item $bin "$pkg/"
          Copy-Item README.md "$pkg/"
          Copy-Item LICENSE "$pkg/"
          Compress-Archive -Path $pkg -DestinationPath "$pkg.zip"
          (Get-FileHash "$pkg.zip" -Algorithm SHA256).Hash + "  " + "$pkg.zip" | Out-File "$pkg.zip.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            body-throwing-movement-${{ needs.prepare.outputs.release_tag }}-${{ matrix.target }}.tar.gz
            body-throwing-movement-${{ needs.prepare.outputs.release_tag }}-${{ matrix.target }}.tar.gz.sha256
            body-throwing-movement-${{ needs.prepare.outputs.release_tag }}-${{ matrix.target }}.zip
            body-throwing-movement-${{ needs.prepare.outputs.release_tag }}-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_tag }}
          files: dist/**

